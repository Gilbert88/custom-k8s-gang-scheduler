apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority-gang
value: 2000
globalDefault: false
description: "High priority for gang workloads"

---

apiVersion: v1
kind: Pod
metadata:
  name: high-gang-worker-1
  annotations:
    gang-scheduler.io/pod-group: "high-priority-job"
spec:
  schedulerName: dumb-scheduler
  priorityClassName: high-priority-gang
  containers:
  - name: worker
    image: busybox:latest
    command: ["sleep", "3600"]

---

apiVersion: v1
kind: Pod
metadata:
  name: high-gang-worker-2
  annotations:
    gang-scheduler.io/pod-group: "high-priority-job"
spec:
  schedulerName: dumb-scheduler
  priorityClassName: high-priority-gang
  containers:
  - name: worker
    image: busybox:latest
    command: ["sleep", "3600"]

---

apiVersion: v1
kind: Pod
metadata:
  name: high-gang-worker-3
