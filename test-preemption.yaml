apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000
globalDefault: false
description: "High priority for important workloads"

---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: low-priority
value: 100
globalDefault: false
description: "Low priority, can be preempted"

---
apiVersion: v1
kind: Pod
metadata:
  name: test-pod-high-pri
spec:
  schedulerName: dumb-scheduler
  priorityClassName: high-priority
  containers:
  - name: busybox
    image: busybox:latest
    command: ["sleep", "3600"]

---

apiVersion: v1
kind: Pod
metadata:
  name: test-pod-low-pri
spec:
  schedulerName: dumb-scheduler
  priorityClassName: low-priority
  containers:
    - name: busybox
      image: busybox:latest
      command: ["sleep", "3600"]